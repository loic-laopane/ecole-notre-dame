name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Frontend ──────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci_secret_placeholder

  # ── Backend ───────────────────────────────
  backend:
    name: Backend (Symfony)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       ndsl_test
          POSTGRES_USER:     ndsl_user
          POSTGRES_PASSWORD: ndsl_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, intl, mbstring, zip
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: Check PHP syntax
        run: find src -name "*.php" | xargs -I{} php -l {} | grep -v "No syntax errors" || true
      - name: Run migrations
        env:
          DATABASE_URL: "postgresql://ndsl_user:ndsl_secret@127.0.0.1:5432/ndsl_test?serverVersion=16&charset=utf8"
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test || true
