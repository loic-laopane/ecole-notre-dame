version: '3.9'

# ═══════════════════════════════════════════════
#  NDSL – Stack locale
#  frontend   → http://localhost:3000
#  api        → http://localhost:8000
#  admin      → http://localhost:8000/admin
#  phpmyadmin → http://localhost:8081
# ═══════════════════════════════════════════════

services:

  # ── MySQL 8 ────────────────────────────────
  db:
    image: mysql:8.0
    container_name: ndsl_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE:      ndsl
      MYSQL_USER:          ndsl_user
      MYSQL_PASSWORD:      ndsl_secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ndsl_net
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ndsl_user", "-pndsl_secret"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── phpMyAdmin ─────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ndsl_pma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST:     db
      PMA_USER:     ndsl_user
      PMA_PASSWORD: ndsl_secret
    ports:
      - "8081:80"
    networks:
      - ndsl_net

  # ── Symfony Backend ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ndsl_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV:      dev
      APP_SECRET:   change_me_in_production
      DATABASE_URL: "mysql://ndsl_user:ndsl_secret@db:3306/ndsl?serverVersion=8.0&charset=utf8mb4"
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY:  "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE:  ndsl_jwt_passphrase
      FRONTEND_URL:    http://localhost:3000
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    ports:
      - "8000:8000"
    networks:
      - ndsl_net

  # ── Next.js Frontend ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: ndsl_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api
      NEXTAUTH_URL:        http://localhost:3000
      NEXTAUTH_SECRET:     change_me_in_production
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    networks:
      - ndsl_net

volumes:
  db_data:
  backend_vendor:
  frontend_node_modules:
  frontend_next:

networks:
  ndsl_net:
    driver: bridge
